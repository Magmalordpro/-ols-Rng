<link rel="stylesheet" href="style.css">
<div id="sidebar">
    <div class="tabs">
        <button id="btn-shop" class="tab-btn active">TIENDA</button>
        <button id="btn-inv" class="tab-btn">COLECCIÓN</button>
        <button id="btn-settings" class="tab-btn">⚙️</button>
    </div>

    <div id="shop-tab" class="scroll">
        <div class="stat-card">
            <div class="flex-row">
                <span class="m-txt" id="money-display">$0</span>
                <button id="mute-btn">🔊</button>
            </div>
            <span id="luck-display" style="color:#00ffcc">🍀 Suerte: x1</span>
        </div>
        
        <button class="collapse-btn" onclick="toggleCollapse('gloves-container')">🧤 GUANTES ▼</button>
        <div id="gloves-container" class="collapsible"></div>
        
        <button class="collapse-btn" onclick="toggleCollapse('potions-container')">🧪 POCIONES ▼</button>
        <div id="potions-container" class="collapsible"></div>
    </div>

    <div id="inv-tab" class="scroll" style="display:none">
        <div id="inventory-container"></div>
    </div>

    <div id="settings-tab" class="scroll" style="display:none">
        <h3>AJUSTES</h3>
        <label class="setting-item">
            <input type="checkbox" id="skip-known"> Omitir animación de auras ya obtenidas
        </label>
        <p style="font-size:10px; color:#555; margin-top:20px">Auto-guardado habilitado localmente.</p>
    </div>
</div>

<div id="game">
    <canvas id="canvas"></canvas>
    
    <div id="char-container">
        <div id="character-glow"></div>
        <svg id="char-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="25" r="15" fill="white"/>
            <path d="M50 40 L50 75 L30 95 M50 75 L70 95 M30 55 L70 55" stroke="white" stroke-width="8" stroke-linecap="round"/>
        </svg>
    </div>

    <!-- Cutscene: REVELACIÓN PROGRESIVA -->
    <div id="cutscene" class="cutscene-hide">
        <div id="flash"></div>
        <div id="cutscene-content">
            <div id="cs-msg">SINTONIZANDO...</div>
            <div id="cs-special-layer"></div> <!-- Aquí van los peces/fuego -->
            <h1 id="cs-name" style="opacity:0">AURA</h1>
        </div>
    </div>

    <div id="aura-display-box">
        <div id="aura-rar">Haz click para iniciar</div>
        <h1 id="aura-name">AURA RNG</h1>
    </div>
    
    <button id="roll-btn">ROLL</button>
    <div class="bonus">BONO EN: <span id="count-display">0</span>/10</div>
</div>

<script src="script.js"></script>
